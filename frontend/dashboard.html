<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowBoard — Dashboard</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
  .project-card .stripe {
    height:3px; border-radius:3px 3px 0 0;
    background:linear-gradient(90deg, var(--color-primary), #A78BFA);
    margin:-20px -20px 14px;
    border-radius:var(--radius) var(--radius) 0 0;
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="brand">⬡ FlowBoard</div>
      <div class="tagline">Project Management</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Workspace</div>
      <a class="nav-item active" href="dashboard.html"><span class="nav-icon">⊞</span> Dashboard</a>
      <a class="nav-item" href="profile.html"><span class="nav-icon">◎</span> My Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="info">
          <p id="sidebar-name">Loading…</p>
          <span id="sidebar-role">member</span>
        </div>
      </div>
      <button class="nav-item text-danger" onclick="AUTH.logout()" style="margin-top:6px;">
        <span class="nav-icon">⇤</span> Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Page header -->
    <div class="page-header">
      <div class="titles">
        <h1>Dashboard</h1>
        <p>Manage and track all your projects</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-modal')">＋ New Project</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="label">Total Projects</div><div class="value accent" id="stat-total">—</div></div>
      <div class="stat-card"><div class="label">Active</div><div class="value" id="stat-active">—</div></div>
      <div class="stat-card"><div class="label">Completed</div><div class="value" id="stat-completed">—</div></div>
      <div class="stat-card"><div class="label">Archived</div><div class="value" id="stat-archived">—</div></div>
    </div>

    <!-- Alert -->
    <div id="page-alert" class="alert"></div>

    <!-- Projects grid -->
    <div id="projects-container">
      <div class="loading">Loading projects…</div>
    </div>

  </main>
</div>

<!-- Create project modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>New Project</h3>
      <button class="modal-close" onclick="closeModal('create-modal')">✕</button>
    </div>
    <div id="create-alert" class="alert"></div>
    <div class="form-group">
      <label class="form-label">Project name *</label>
      <input id="create-name" type="text" class="form-input" placeholder="e.g. Website Redesign"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="create-desc" class="form-textarea" placeholder="What is this project about?"></textarea>
    </div>
    <button id="create-btn" data-label="Create Project" class="btn btn-primary btn-full" onclick="createProject()">Create Project</button>
  </div>
</div>

<!-- Edit project modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Project</h3>
      <button class="modal-close" onclick="closeModal('edit-modal')">✕</button>
    </div>
    <div id="edit-alert" class="alert"></div>
    <input type="hidden" id="edit-id"/>
    <div class="form-group">
      <label class="form-label">Project name</label>
      <input id="edit-name" type="text" class="form-input"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="edit-desc" class="form-textarea"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="edit-status" class="form-select">
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="archived">Archived</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;">
      <button id="edit-btn" data-label="Save Changes" class="btn btn-primary" style="flex:1" onclick="saveProject()">Save Changes</button>
      <button class="btn btn-ghost" onclick="closeModal('edit-modal')">Cancel</button>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script>
  AUTH.requireAuth();
  AUTH.populateSidebar();

  let projects = [];

  async function loadProjects() {
    try {
      projects = await API.getProjects(1, 50) || [];
      renderProjects();
      updateStats();
    } catch(e) {
      showAlert('page-alert', e.message);
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent     = projects.length;
    document.getElementById('stat-active').textContent    = projects.filter(p => p.status === 'active').length;
    document.getElementById('stat-completed').textContent = projects.filter(p => p.status === 'completed').length;
    document.getElementById('stat-archived').textContent  = projects.filter(p => p.status === 'archived').length;
  }

  function renderProjects() {
    const el = document.getElementById('projects-container');
    if (!projects.length) {
      el.innerHTML = `<div class="empty-state">
        <div class="icon">📁</div>
        <h3>No projects yet</h3>
        <p>Create your first project to get started</p>
      </div>`;
      return;
    }
    el.innerHTML = `<div class="grid">${projects.map(projectCard).join('')}</div>`;
  }

  function projectCard(p) {
    return `
      <div class="project-card" onclick="goToProject('${p.id}')">
        <div class="stripe"></div>
        <div class="top">
          <h3>${escHtml(p.name)}</h3>
          ${statusBadge(p.status)}
        </div>
        <p class="desc">${escHtml(p.description || 'No description provided.')}</p>
        <div class="footer">
          <span class="meta">Created ${fmtDate(p.created_at)}</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="editProject('${p.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProject('${p.id}')">Delete</button>
          </div>
        </div>
      </div>`;
  }

  function goToProject(id) { window.location.href = `project.html?id=${id}`; }

  async function createProject() {
    const name = document.getElementById('create-name').value.trim();
    const desc = document.getElementById('create-desc').value.trim();
    if (!name) return showAlert('create-alert', 'Project name is required.');
    setLoading('create-btn', true);
    try {
      await API.createProject({ name, description: desc });
      closeModal('create-modal');
      document.getElementById('create-name').value = '';
      document.getElementById('create-desc').value = '';
      await loadProjects();
      showAlert('page-alert', 'Project created successfully!', 'success');
    } catch(e) {
      showAlert('create-alert', e.message);
    } finally {
      setLoading('create-btn', false);
    }
  }

  function editProject(id) {
    const p = projects.find(p => p.id === id);
    if (!p) return;
    document.getElementById('edit-id').value          = id;
    document.getElementById('edit-name').value        = p.name;
    document.getElementById('edit-desc').value        = p.description || '';
    document.getElementById('edit-status').value      = p.status;
    openModal('edit-modal');
  }

  async function saveProject() {
    const id     = document.getElementById('edit-id').value;
    const name   = document.getElementById('edit-name').value.trim();
    const desc   = document.getElementById('edit-desc').value.trim();
    const status = document.getElementById('edit-status').value;
    if (!name) return showAlert('edit-alert', 'Project name is required.');
    setLoading('edit-btn', true);
    try {
      await API.updateProject(id, { name, description: desc, status });
      closeModal('edit-modal');
      await loadProjects();
      showAlert('page-alert', 'Project updated.', 'success');
    } catch(e) {
      showAlert('edit-alert', e.message);
    } finally {
      setLoading('edit-btn', false);
    }
  }

  async function deleteProject(id) {
    if (!confirm('Delete this project? This cannot be undone.')) return;
    try {
      await API.deleteProject(id);
      await loadProjects();
      showAlert('page-alert', 'Project deleted.', 'success');
    } catch(e) {
      showAlert('page-alert', e.message);
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadProjects();
</script>
</body>
</html>
